<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALV — Font Playground</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a18; color: #b4b2a9; font-family: monospace; padding: 1.5rem; }
  .top { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 24px; }
  .editor { display: flex; flex-direction: column; gap: 8px; }
  .grid-row { display: flex; gap: 4px; }
  .cell { width: 26px; height: 26px; border-radius: 2px; background: #2c2c2a; border: 1px solid #3a3a36; cursor: pointer; }
  .cell.on { background: #e8e6de; border-color: #e8e6de; }
  .previews { display: flex; flex-direction: column; gap: 10px; }
  .lbl { font-size: 9px; color: #5f5e5a; margin-bottom: 4px; }
  .actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-top: 4px; }
  button { font-family: monospace; font-size: 10px; color: #b4b2a9; background: none; border: 1px solid #3a3a36; padding: 3px 9px; border-radius: 2px; cursor: pointer; }
  button:hover { border-color: #5f5e5a; color: #e8e6de; }
  input.char-in { font-family: monospace; font-size: 11px; background: #2c2c2a; border: 1px solid #3a3a36; color: #e8e6de; padding: 3px 6px; width: 38px; border-radius: 2px; text-align: center; }
  .presets { display: flex; gap: 5px; flex-wrap: wrap; }
  .pb { font-family: monospace; font-size: 9px; color: #5f5e5a; background: none; border: 1px solid #2c2c2a; padding: 2px 6px; border-radius: 2px; cursor: pointer; }
  .pb:hover { border-color: #3a3a36; color: #b4b2a9; }
  .map-out { font-size: 9px; color: #3a3a36; white-space: pre; line-height: 1.5; margin-top: 4px; }
  .text-section { display: flex; flex-direction: column; gap: 10px; }
  .text-in { font-family: monospace; font-size: 12px; background: #2c2c2a; border: 1px solid #3a3a36; color: #e8e6de; padding: 6px 10px; border-radius: 2px; width: 100%; outline: none; }
  .text-in:focus { border-color: #5f5e5a; }
  .text-render { overflow-x: auto; padding: 4px 0; min-height: 60px; }
  .size-row { display: flex; gap: 8px; align-items: center; }
  .sb { font-size: 9px; color: #5f5e5a; background: none; border: 1px solid #2c2c2a; padding: 2px 7px; border-radius: 2px; cursor: pointer; font-family: monospace; }
  .sb.active { border-color: #5f5e5a; color: #e8e6de; }
  .char-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; padding-top: 16px; border-top: 1px solid #2c2c2a; }
  .cblock { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
  .cblock:hover svg { opacity: .7; }
  .clbl { font-size: 8px; color: #3a3a36; }
</style>
</head>
<body>
<div class="top">
  <div class="editor">
    <div id="grid"></div>
    <div class="actions">
      <button onclick="clearGrid()">clear</button>
      <button onclick="invertGrid()">invert</button>
      <button onclick="saveChar()">save →</button>
      <input class="char-in" id="char-label" value="?" maxlength="2"/>
      <button onclick="copyMap()">copy</button>
    </div>
    <div class="presets" id="presets"></div>
    <div class="map-out" id="map-out"></div>
  </div>
  <div class="previews">
    <div><div class="lbl">1×</div><svg id="prev1" width="58" height="94" viewBox="0 0 58 94"></svg></div>
    <div><div class="lbl">2×</div><svg id="prev2" width="116" height="188" viewBox="0 0 116 188"></svg></div>
  </div>
</div>

<div class="text-section">
  <div class="size-row">
    <span class="lbl">texto libre</span>
    <button class="sb active" onclick="setSize(6,1,'sz-xs')" id="sz-xs">xs</button>
    <button class="sb" onclick="setSize(10,2,'sz-sm')" id="sz-sm">sm</button>
    <button class="sb" onclick="setSize(14,3,'sz-md')" id="sz-md">md</button>
  </div>
  <input class="text-in" id="text-in" value="alv live vocabulary" oninput="renderText()"/>
  <div class="text-render" id="text-render"></div>
</div>

<div class="lbl" style="margin-top:16px">caracteres — click para cargar en el editor</div>
<div class="char-grid" id="char-grid"></div>

function buildGrid(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  state.forEach((row,r)=>{
    const rowEl=document.createElement('div');
    rowEl.className='grid-row';
    row.forEach((v,c)=>{
      const cell=document.createElement('div');
      cell.className='cell'+(v?' on':'');
      cell.onclick=()=>{state[r][c]^=1;buildGrid();};
      rowEl.appendChild(cell);
    });
    g.appendChild(rowEl);
  });
  updatePreviews();
  updateMap();
  renderText();
}

function clearGrid(){state=Array.from({length:ROWS},()=>Array(COLS).fill(0));buildGrid();}
function invertGrid(){state=state.map(r=>r.map(v=>v?0:1));buildGrid();}

function saveChar(){
  const ch=document.getElementById('char-label').value.trim();
  if(ch){FONT[ch]=state.map(r=>[...r]);buildCharGrid();renderText();}
}

function copyMap(){
  const ch=document.getElementById('char-label').value.trim();
  navigator.clipboard.writeText(`'${ch}': ${JSON.stringify(state)}`).then(()=>{
    const btn=[...document.querySelectorAll('button')].find(b=>b.textContent==='copy');
    if(btn){btn.textContent='✓';setTimeout(()=>btn.textContent='copy',1200);}
  });
}

function updatePreviews(){
  [[10,2,'prev1'],[20,4,'prev2']].forEach(([C,G,id])=>{
    const S=C+G,svg=document.getElementById(id);
    svg.innerHTML='';
    state.forEach((row,r)=>row.forEach((v,c)=>{
      if(v){const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
      rect.setAttribute('x',c*S);rect.setAttribute('y',r*S);
      rect.setAttribute('width',C);rect.setAttribute('height',C);
      rect.setAttribute('fill','#e8e6de');svg.appendChild(rect);}
    }));
  });
}

function updateMap(){
  document.getElementById('map-out').textContent=
    state.map((row,r)=>`r${r}:[${row.join('')}]`).join('\n');
}

function setSize(c,g,id){
  cellSz=c;cellGap=g;
  document.querySelectorAll('.sb').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  renderText();
}

function renderText(){
  const text=document.getElementById('text-in').value;
  const C=cellSz,G=cellGap,S=C+G;
  const charW=5*S-G,charH=8*S-G,gap=S*2;
  const chars=[...text];
  const totalW=Math.max(chars.length*(charW+gap)-gap,1);
  let content='';
  chars.forEach((ch,i)=>{
    const map=FONT[ch]||FONT[ch.toUpperCase()];
    const ox=i*(charW+gap);
    if(map) map.forEach((row,r)=>row.forEach((v,c)=>{
      if(v) content+=`<rect x="${ox+c*S}" y="${r*S}" width="${C}" height="${C}" fill="#e8e6de"/>`;
    }));
    else content+=`<rect x="${ox+1}" y="${charH/2-1}" width="${charW-2}" height="2" fill="#3a3a36"/>`;
  });
  document.getElementById('text-render').innerHTML=
    `<svg width="${totalW}" height="${charH}" viewBox="0 0 ${totalW} ${charH}">${content}</svg>`;
}

function buildCharGrid(){
  const el=document.getElementById('char-grid');
  el.innerHTML='';
  const C2=6,G2=1,S2=C2+G2,W2=5*S2-G2,H2=8*S2-G2;
  Object.entries(FONT).forEach(([ch,map])=>{
    if(ch===' ') return;
    let rects='';
    map.forEach((row,r)=>row.forEach((v,c)=>{
      if(v) rects+=`<rect x="${c*S2}" y="${r*S2}" width="${C2}" height="${C2}" fill="#e8e6de"/>`;
    }));
    const b=document.createElement('div');
    b.className='cblock';
    b.title=`cargar '${ch}'`;
    b.innerHTML=`<svg width="${W2}" height="${H2}" viewBox="0 0 ${W2} ${H2}">${rects}</svg><div class="clbl">${ch}</div>`;
    b.onclick=()=>{
      state=map.map(r=>[...r]);
      document.getElementById('char-label').value=ch;
      buildGrid();
      window.scrollTo(0,0);
    };
    el.appendChild(b);
  });
}

buildGrid();
buildCharGrid();
</script>
